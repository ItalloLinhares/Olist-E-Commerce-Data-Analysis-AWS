name: Deploy to AWS S3

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Criar Arquivo ZIP
        run: |
          cd "Olist - AWS"
          zip -r ../libs_olist.zip . -x "*.git*" "*__pycache__*" "*.pytest_cache*"
          echo "✅ Pasta 'Olist - AWS' compactada com sucesso."

      - name: Configurar Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Upload para o S3
        run: |
          echo "--- ENVIANDO PARA O S3 ---"
          aws s3 cp libs_olist.zip s3://il-datalake-olist/scripts/libs/libs_olist.zip