name: Deploy to AWS S3

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Criar Arquivo ZIP
        run: |
          echo "--- Conteúdo na raiz do repositório ---"
          ls -la
          
          # Compacta tudo o que foi baixado na raiz (.)
          # O zip será criado um nível acima para não incluir a si mesmo
          zip -r ../libs_olist.zip . -x "*.git*" "*__pycache__*" "*.pytest_cache*" ".github*"
          
          # Move o zip de volta para a raiz para o próximo passo encontrá-lo
          mv ../libs_olist.zip .
          echo "✅ Conteúdo do repositório compactado com sucesso."

      - name: Configurar Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Upload para o S3
        run: |
          echo "--- ENVIANDO PARA O S3 ---"
          aws s3 cp libs_olist.zip s3://il-datalake-olist/scripts/libs/libs_olist.zip